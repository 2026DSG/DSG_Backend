server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    host : ${DB_HOST}
    port : ${DB_PORT}
    username: ${DB_USERNAME}

  jpa:
    database: mysql
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

jwt:
  secretKey: ${JWT_SECRET_KEY}
  accessExp: ${ACCESS_EXP}
  refreshExp: ${REFRESH_EXP}
  header: ${HEADER}
  prefix: ${PREFIX}
