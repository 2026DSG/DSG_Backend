name: dsg-CD
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: build with gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: build

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_PASSWORD}}

      - name: Build and Push Image
        run: |
          docker build -t ${{secrets.DOCKERHUB_USERNAME}}/${{secrets.DOCKERHUB_IMGNAME}} .
          docker push ${{secrets.DOCKERHUB_USERNAME}}/${{secrets.DOCKERHUB_IMGNAME}}

      - name: SSH to EC2 deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            sudo docker pull ${{secrets.DOCKERHUB_USERNAME}}/${{secrets.DOCKERHUB_IMGNAME}}
            sudo docker-compose up -d --remove-orphans
            sudo docker image prune -f
